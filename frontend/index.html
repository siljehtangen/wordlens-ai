<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordLens AI</title>
  <meta name="description" content="Understand any word, concept, or idea through multiple AI-powered perspectives." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent:      'var(--accent)',
            'accent-lt': 'var(--accent-light)',
            'bg-pri':    'var(--bg-primary)',
            'bg-sec':    'var(--bg-secondary)',
            'tx-pri':    'var(--text-primary)',
            'tx-sec':    'var(--text-secondary)',
            'tx-muted':  'var(--text-muted)',
            'user-bg':   'var(--user-bg)',
            'user-tx':   'var(--user-text)',
            'bot-bg':    'var(--bot-bg)',
            'bot-tx':    'var(--bot-text)',
            'bot-bdr':   'var(--bot-border)',
            'inp-bg':    'var(--input-bg)',
            'inp-bdr':   'var(--input-border)',
            'badge-bg':  'var(--badge-bg)',
            'badge-tx':  'var(--badge-text)',
          }
        }
      }
    }
  </script>

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background-color: var(--bg-primary, #e8f1fb);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; }

    /* ── Theme variables ── */
    .app {
      --bg-primary:     #dbeafe;
      --bg-secondary:   #bfdbfe;
      --accent:         #2563eb;
      --accent-light:   rgba(37,99,235,0.12);
      --accent-bright:  #3b82f6;
      --accent-glow:    rgba(37,99,235,0.30);
      --text-primary:   #1e3a5f;
      --text-secondary: #3a5f8f;
      --text-muted:     #4f7fa6;
      --user-bg:        #2563eb;
      --user-text:      #eff6ff;
      --bot-bg:         #eff6ff;
      --bot-text:       #1e3a5f;
      --bot-border:     rgba(37,99,235,0.15);
      --input-bg:       #eff6ff;
      --input-border:   rgba(37,99,235,0.28);
      --badge-bg:       rgba(37,99,235,0.1);
      --badge-text:     #2563eb;
      transition: background-color 0.4s ease, color 0.3s ease;
    }
    .app.lens-learning {
      --bg-primary:     #180d2e;
      --bg-secondary:   #241545;
      --accent:         #9470c4;
      --accent-light:   rgba(148,112,196,0.16);
      --accent-bright:  #b08dd4;
      --accent-glow:    rgba(148,112,196,0.28);
      --text-primary:   #e8d8f8;
      --text-secondary: #b898e0;
      --text-muted:     #8a66b8;
      --user-bg:        #6b4fa8;
      --user-text:      #e8d8f8;
      --bot-bg:         #241545;
      --bot-text:       #e8d8f8;
      --bot-border:     rgba(148,112,196,0.22);
      --input-bg:       #241545;
      --input-border:   rgba(148,112,196,0.35);
      --badge-bg:       rgba(148,112,196,0.12);
      --badge-text:     #b08dd4;
    }
    .app.lens-game {
      --bg-primary:     #0a1a0a;
      --bg-secondary:   #0f2010;
      --accent:         #4a9e6a;
      --accent-light:   rgba(74,158,106,0.16);
      --accent-bright:  #78bc96;
      --accent-glow:    rgba(74,158,106,0.28);
      --text-primary:   #c8ecd4;
      --text-secondary: #7ab890;
      --text-muted:     #4a9e68;
      --user-bg:        #2d7a48;
      --user-text:      #c8ecd4;
      --bot-bg:         #0f2010;
      --bot-text:       #c8ecd4;
      --bot-border:     rgba(74,158,106,0.24);
      --input-bg:       #0f2010;
      --input-border:   rgba(74,158,106,0.38);
      --badge-bg:       rgba(74,158,106,0.12);
      --badge-text:     #78bc96;
    }
    .app.lens-cyberpunk {
      --bg-primary:     #0d0d10;
      --bg-secondary:   #18181f;
      --accent:         #3a5272;
      --accent-light:   rgba(58,82,114,0.22);
      --accent-bright:  #7aaad0;
      --accent-glow:    rgba(122,170,208,0.32);
      --text-primary:   #f0f4f8;
      --text-secondary: #b8cee0;
      --text-muted:     #7a98b0;
      --user-bg:        #2a3a50;
      --user-text:      #f0f4f8;
      --bot-bg:         #18181f;
      --bot-text:       #f0f4f8;
      --bot-border:     rgba(184,206,224,0.20);
      --input-bg:       #18181f;
      --input-border:   rgba(184,206,224,0.32);
      --badge-bg:       rgba(184,206,224,0.10);
      --badge-text:     #b8cee0;
    }
    .app.lens-poetic {
      --bg-primary:     #20100a;
      --bg-secondary:   #301a0a;
      --accent:         #c8763a;
      --accent-light:   rgba(200,118,58,0.16);
      --accent-bright:  #dea070;
      --accent-glow:    rgba(200,118,58,0.28);
      --text-primary:   #f5e8cc;
      --text-secondary: #d4a84a;
      --text-muted:     #a06030;
      --user-bg:        #a03a10;
      --user-text:      #f5e8cc;
      --bot-bg:         #301a0a;
      --bot-text:       #f5e8cc;
      --bot-border:     rgba(200,118,58,0.22);
      --input-bg:       #301a0a;
      --input-border:   rgba(200,118,58,0.35);
      --badge-bg:       rgba(200,118,58,0.12);
      --badge-text:     #dea070;
    }

    /* ── Scrollbars ── */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    .chat-scrollbar::-webkit-scrollbar { width: 3px; }
    .chat-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .chat-scrollbar::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
      opacity: 0.4;
    }

    /* ── Glass panel ── */
    .glass-panel {
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
    }

    /* ── Focus ring ── */
    .input-ring:focus-within {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px var(--accent-light), 0 1px 6px rgba(0,0,0,0.05);
    }

    /* ── Ambient glow behind empty state icon ── */
    .ambient-circle {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
      filter: blur(18px);
      transform: scale(1.8);
    }

    /* ── Keyframes ── */
    @keyframes msgIn    { from{opacity:0;transform:translateY(10px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes pulseIcon{ 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.85} }
    @keyframes dotBounce{ 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-5px);opacity:1} }
    @keyframes blink    { 50%{opacity:0} }
    @keyframes spin     { to{transform:rotate(360deg)} }

    .msg-in   { animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .pulse-icon { animation: pulseIcon 2.8s ease-in-out infinite; }
    .cursor   { display:inline-block; color:var(--accent); animation: blink 1s step-end infinite; }

    .typing-dots span {
      display:block; width:7px; height:7px; border-radius:50%;
      background:var(--accent); animation: dotBounce 1.3s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay:.2s; }
    .typing-dots span:nth-child(3) { animation-delay:.4s; }

    .spinner {
      display:block; width:15px; height:15px;
      border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation: spin 0.7s linear infinite;
    }

    /* ── Cyberpunk scanlines ── */
    .lens-cyberpunk .chat-inner { position: relative; }
    .lens-cyberpunk .chat-inner::after {
      content:""; position:fixed; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,.016) 2px,rgba(0,255,255,.016) 4px);
      pointer-events:none; z-index:0;
    }
    .lens-cyberpunk .msg-in { position:relative; z-index:1; }
  </style>

  <link data-trunk rel="rust" data-bin="wordlens-frontend" />
</head>
<body>
  <!-- Leptos mounts here -->
</body>
</html>
